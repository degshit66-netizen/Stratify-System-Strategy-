name: Auto-Build APK and EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Packages
        run: npm install

      - name: Build Web Assets & Server
        run: npm run build

      - name: Add Android Platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Build APK (Gradle)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: STRATIFY-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Packages
        run: npm install

      - name: Build Web Assets & Server
        run: npm run build

      - name: Package Windows EXE (Electron)
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: STRATIFY-Windows-EXE
          path: release/*.exe
